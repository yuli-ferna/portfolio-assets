name: Trigger portfolio redeploy

on:
  push:
    branches: [main]
    paths:
      - 'locale/**.json'
      - 'assets.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body