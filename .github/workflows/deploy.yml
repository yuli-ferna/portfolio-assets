name: Trigger portfolio redeploy

on:
  push:
    branches: [main]
    paths:
      - 'locale/**.json'
      - 'assets.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
        
      - name: Trigger Netlify deploy hook
        if: ${{ secrets.NETLIFY_DEPLOY_HOOK != null }}
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK }}" \
            --fail-with-body